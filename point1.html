<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Page</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        .ad-header, .ad-footer { margin: 10px 0; }
        .center-box { border: 2px solid #ccc; padding: 20px; width: 80%; margin: 20px auto; border-radius: 10px; }
        .hidden { display: none; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        #timer { font-size: 24px; font-weight: bold; margin: 10px; }
    </style>
    
    <script src="https://pl29356253.effectivecpmnetwork.com/23/52/7b/23527bc19bc0c40d9ce713d855526d69.js"></script>
    <script src="https://pl29356256.effectivecpmnetwork.com/17/e9/8a/17e98a5734a03ce7f125160fdb7dd4a8.js"></script>
</head>
<body>

    <div class="ad-header">
        <script>atOptions = {'key' : '316607f642e9799b9d1b6f5f5db9d378','format' : 'iframe','height' : 90,'width' : 728,'params' : {}};</script>
        <script src="https://www.highperformanceformat.com/316607f642e9799b9d1b6f5f5db9d378/invoke.js"></script>
    </div>

    <div class="center-box">
        <div id="status-text">Please wait...</div>
        <div id="timer">9</div>
        <button id="verify-btn" class="hidden" onclick="startSecondTimer()">Verify</button>
        <button id="continue-btn" class="hidden" onclick="openPages()">Continue</button>
    </div>

    <div class="ad-footer">
        <script>atOptions = {'key' : '11a07e056c0614350727fba232bcc005','format' : 'iframe','height' : 250,'width' : 300,'params' : {}};</script>
        <script src="https://www.highperformanceformat.com/11a07e056c0614350727fba232bcc005/invoke.js"></script>
    </div>

    <script>
        let timeLeft = 9;
        const timerDisplay = document.getElementById('timer');
        const verifyBtn = document.getElementById('verify-btn');
        const continueBtn = document.getElementById('continue-btn');
        const statusText = document.getElementById('status-text');

        // First Timer (9 Seconds)
        const countdown1 = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown1);
                timerDisplay.classList.add('hidden');
                verifyBtn.classList.remove('hidden');
                statusText.innerText = "Click Verify to proceed";
            }
        }, 1000);

        // Second Timer (10 Seconds)
        function startSecondTimer() {
            verifyBtn.classList.add('hidden');
            statusText.innerText = "Verifying... wait 10 seconds";
            timerDisplay.classList.remove('hidden');
            timeLeft = 10;
            timerDisplay.innerText = timeLeft;

            const countdown2 = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown2);
                    timerDisplay.classList.add('hidden');
                    continueBtn.classList.remove('hidden');
                    statusText.innerText = "Done! Click Continue";
                }
            }, 1000);
        }

        // Open Pages
        function openPages() {
            // Open point2.html in new tab
            window.open('point2.html', '_blank');
            // Redirect current page to Smartlink
            window.location.href = 'https://www.effectivecpmnetwork.com/mrneyfk9?key=a0779778c1be0ef56d1f5e81ea137647';
        }
    </script>
</body>
</html>
