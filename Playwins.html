<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function RewardPlay() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [userState, setUserState] = useState({
                name: "Alex_ProGamer",
                coins: 4250,
                xp: 2450,
                level: 12,
                streak: 5,
                rank: 42
            });
            const [notification, setNotification] = useState(null);

            const notify = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(null), 3000);
            };

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100 font-sans p-4 md:p-8">
                    {notification && (
                        <div className="fixed top-6 right-6 z-50 bg-purple-600 text-white px-6 py-3 rounded-xl shadow-2xl">
                            {notification}
                        </div>
                    )}
                    
                    <header className="flex justify-between items-center pb-8 max-w-6xl mx-auto">
                        <h1 className="text-2xl font-black bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                            REWARDPLAY
                        </h1>
                        <div className="flex gap-4">
                            <div className="flex items-center gap-2 bg-slate-900 px-4 py-2 rounded-full border border-slate-800">
                                <span>💰 {userState.coins}</span>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-6xl mx-auto flex flex-col md:flex-row gap-8">
                        <aside className="w-full md:w-64 flex flex-row md:flex-col gap-2 overflow-x-auto pb-4">
                            {['dashboard', 'tasks', 'games', 'withdraw'].map((tab) => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-3 rounded-xl capitalize font-bold text-sm ${activeTab === tab ? 'bg-purple-600' : 'bg-slate-900'}`}>
                                    {tab}
                                </button>
                            ))}
                        </aside>

                        <main className="flex-1">
                            {activeTab === 'dashboard' && <Dashboard user={userState} />}
                            {activeTab === 'tasks' && <Tasks setCoins={setUserState} notify={notify} />}
                            {activeTab === 'games' && <Games setCoins={setUserState} notify={notify} />}
                            {activeTab === 'withdraw' && <Withdraw user={userState} setCoins={setUserState} notify={notify} />}
                        </main>
                    </div>
                </div>
            );
        }

        function Dashboard({ user }) {
            return (
                <div className="space-y-6">
                    <div className="bg-slate-900 p-8 rounded-3xl border border-slate-800">
                        <h2 className="text-3xl font-bold">Welcome back, {user.name}!</h2>
                    </div>
                </div>
            );
        }

        function Tasks({ setCoins, notify }) {
            return (
                <div className="space-y-4">
                    <div className="bg-slate-900 p-4 rounded-2xl flex justify-between items-center border border-slate-800">
                        <span>Follow Instagram (100 coins)</span>
                        <button onClick={() => { setCoins(prev => ({...prev, coins: prev.coins + 100})); notify("Earned 100!"); }} className="bg-emerald-600 px-4 py-2 rounded-lg">Claim</button>
                    </div>
                </div>
            );
        }

        function Games({ setCoins, notify }) {
            return (
                <div className="bg-slate-900 p-8 rounded-2xl text-center">
                    <button onClick={() => { setCoins(prev => ({...prev, coins: prev.coins + 100})); notify("Won 100!"); }} className="bg-purple-600 px-8 py-3 rounded-full">Spin Wheel</button>
                </div>
            );
        }

        function Withdraw({ user, setCoins, notify }) {
            return (
                <div className="bg-slate-900 p-8 rounded-2xl">
                    <h3 className="text-xl font-bold mb-4">Cash Out</h3>
                    <button onClick={() => { if(user.coins >= 2000) { setCoins(prev => ({...prev, coins: prev.coins - 2000})); notify("Requested!"); } }} className="w-full bg-emerald-600 py-3 rounded-xl">Withdraw</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RewardPlay />);
    </script>
</body>
</html>
