<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | RewardPlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100">

    <nav class="flex items-center justify-between p-6 max-w-7xl mx-auto">
        <div class="text-2xl font-black text-white">REWARD<span class="text-purple-500">PLAY</span></div>
        <div class="flex items-center gap-4">
            <div id="userEmail" class="text-sm text-slate-400"></div>
            <button onclick="handleLogout()" class="px-4 py-2 bg-red-600 rounded-full text-sm font-bold">Logout</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto mt-10 p-6 space-y-6">
        <!-- Wallet Card -->
        <div class="bg-gradient-to-r from-purple-900 to-indigo-900 p-8 rounded-3xl border border-purple-700 shadow-xl text-center">
            <h3 class="text-slate-300 text-sm font-bold uppercase tracking-widest">Total Balance</h3>
            <div id="totalPoints" class="text-5xl font-black my-2">0</div>
            <p class="text-purple-200 text-sm">Points Earned</p>
        </div>

        <!-- Earn Section -->
        <div class="bg-slate-900 p-8 rounded-3xl border border-slate-700">
            <h2 class="text-2xl font-bold mb-4">Earn Coins</h2>
            <p class="text-slate-400 mb-6">Watch ads and earn 80 points per ad.</p>
            <button onclick="addPoints()" id="earnBtn" class="w-full py-4 bg-blue-600 rounded-xl font-bold hover:bg-blue-500 transition">Watch Ads & Earn</button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Apni config yahan wapas daal dena
        const firebaseConfig = { /* Wahi config jo index.html mein hai */ };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // 1. Check Login & Setup Real-time Listener
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
            } else {
                currentUser = user;
                document.getElementById('userEmail').innerText = user.email;

                // Points real-time mein listen karo
                const userRef = doc(db, "users", user.uid);
                onSnapshot(userRef, (doc) => {
                    if (doc.exists()) {
                        document.getElementById('totalPoints').innerText = doc.data().points || 0;
                    } else {
                        // Agar document nahi hai, toh pehli baar create karo
                        setDoc(userRef, { points: 0, email: user.email });
                    }
                });
            }
        });

        // 2. Add Points Logic
        window.addPoints = async () => {
            if(!currentUser) return;
            const btn = document.getElementById('earnBtn');
            btn.innerText = "Adding...";
            
            try {
                const userRef = doc(db, "users", currentUser.uid);
                // 80 points increment (server-side update)
                await updateDoc(userRef, {
                    points: increment(80)
                });
                alert("80 Points added!");
            } catch (e) {
                console.error(e);
                alert("Error adding points.");
            } finally {
                btn.innerText = "Watch Ads & Earn";
            }
        };

        window.handleLogout = () => signOut(auth).then(() => window.location.href = 'index.html');
    </script>
</body>
</html>
