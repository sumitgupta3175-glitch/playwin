<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw Money</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .container { width: 90%; max-width: 400px; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Withdraw Request</h2>
    <p>Minimum Withdrawal: <b>₹100</b></p>
    
    <form id="withdrawForm">
        <input type="text" id="upiId" placeholder="Enter UPI ID (e.g., name@upi)" required>
        <input type="number" id="amount" placeholder="Amount (Minimum ₹100)" required>
        <button type="submit">Submit Request</button>
    </form>
</div>

<script>
    // 1. Firebase Initialization (Apna config yahan daalo)
    // const firebaseConfig = { ... };
    // firebase.initializeApp(firebaseConfig);

    document.getElementById('withdrawForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const upiId = document.getElementById('upiId').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const minLimit = 100;

        // 2. Minimum Limit Validation
        if (amount < minLimit) {
            alert("Error: Minimum withdrawal limit is ₹100.");
            return;
        }

        // 3. Database me bhejne ka code (Firebase)
        console.log("Processing Request for:", upiId, "Amount:", amount);
        
        // Agar database connect hai toh ye uncomment karo:
        /*
        firebase.firestore().collection("withdrawals").add({
            upiId: upiId,
            amount: amount,
            status: "pending",
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            alert("Request submitted successfully!");
        }).catch((error) => {
            alert("Error: " + error.message);
        });
        */
        
        alert("Request submitted for ₹" + amount + ". Admin will process it soon.");
    });
</script>

</body>
</html>
