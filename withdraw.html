<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw Money</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .container { width: 90%; max-width: 400px; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Withdraw Request</h2>
    <p>Minimum Withdrawal: <b>₹100</b></p>
    
    <form id="withdrawForm">
        <input type="text" id="upiId" placeholder="Enter UPI ID (e.g., name@upi)" required>
        <input type="number" id="amount" placeholder="Amount (Minimum ₹100)" required>
        <button type="submit" id="submitBtn">Submit Request</button>
    </form>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_MESSAGING_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    document.getElementById('withdrawForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // 1. Auth check: User login hai ya nahi?
        const user = auth.currentUser;
        if (!user) {
            alert("Bhai, pehle login karo!");
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;

        const upiId = document.getElementById('upiId').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const userId = user.uid; // Ab ye dynamic hai!
        
        if (amount < 100) {
            alert("Error: Minimum withdrawal limit is ₹100.");
            btn.disabled = false;
            return;
        }

        try {
            const userDoc = await db.collection("users").doc(userId).get();
            
            if (!userDoc.exists) {
                alert("User profile not found!");
                btn.disabled = false;
                return;
            }

            const userData = userDoc.data();

            if (userData.points < amount) {
                alert("Insufficient balance!");
                btn.disabled = false;
                return;
            }

            if (userData.lastWithdrawalDate) {
                const lastWithdrawal = userData.lastWithdrawalDate.toDate();
                const now = new Date();
                const diffInHours = (now - lastWithdrawal) / (1000 * 60 * 60);

                if (diffInHours < 24) {
                    alert("Limit exceeded! You can only withdraw once every 24 hours.");
                    btn.disabled = false;
                    return;
                }
            }

            // Save request
            await db.collection("withdrawals").add({
                userId: userId,
                upiId: upiId,
                amount: amount,
                status: "pending",
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            // Update user balance/time
            await db.collection("users").doc(userId).update({
                lastWithdrawalDate: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert("Request submitted successfully!");
            btn.disabled = false;
            document.getElementById('withdrawForm').reset();
        } catch (error) {
            console.error(error);
            alert("Error: " + error.message);
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
